<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/login.css">
    <title>Login</title>
</head>
<body class="d-flex flex-column" style="min-height: 100vh; padding-top: 70px;">
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container ">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-heart-pulse-fill"></i> MediNex
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link px-4 ms-2" href="signup.html">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="d-flex justify-content-center align-items-center flex-grow-1 w-100 px-3">
        <div class="w-100" style="max-width: 500px;">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4">Welcome Back!</h2>
                    <p class="text-center text-muted mb-4">Login with your details to continue</p>
                    <div class="alert alert-info small" role="alert">
                        Demo accounts:
                        <br>Patient: <strong>patient@medinex.demo</strong> / <strong>123</strong>
                        <br>Doctor: <strong>doctor@medinex.demo</strong> / <strong>123</strong>
                        <br>Admin: <strong>admin@medinex.com</strong> / <strong>123</strong>
                    </div>
                    <form id="demo-login-form" class="needs-validation" novalidate>
                        <label id="errors" for="errors" class="form-label d-block text-center">&nbsp;</label>
                        <div class="mb-3">
                            <label for="useremail" class="form-label">Email:</label>
                            <input type="email" id="useremail" name="useremail" class="form-control" placeholder="Email Address" required>
                        </div>
                        <div class="mb-3">
                            <label for="userpassword" class="form-label">Password:</label>
                            <input type="password" id="userpassword" name="userpassword" class="form-control" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                    </form>
                    <div class="text-center">
                        <p class="mb-2"><small>Don't have an account? <a href="signup.html" class="text-decoration-none">Sign Up</a></small></p>
                        <p class="mb-0"><small>Forgot password? <a href="forgot-password.html" class="text-decoration-none">Reset Password</a></small></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const builtInDemoUsers = {
            "patient@medinex.demo": {
                password: "123",
                dashboard: "patient/index.html",
                fullName: "Patient Demo",
                role: "patient"
            },
            "doctor@medinex.demo": {
                password: "123",
                dashboard: "doctor/index.html",
                fullName: "Doctor Demo",
                role: "doctor"
            },
            "admin@medinex.com": {
                password: "123",
                dashboard: "admin/index.html",
                fullName: "Administrator",
                role: "admin"
            }
        };

        const form = document.getElementById("demo-login-form");
        const errorLabel = document.getElementById("errors");
        const savedUsers = JSON.parse(localStorage.getItem("medinexDemoUsers") || "{}");
        const demoUsers = { ...builtInDemoUsers, ...savedUsers };
        const flashMessage = sessionStorage.getItem("medinexFlashMessage");

        if (flashMessage) {
            errorLabel.textContent = flashMessage;
            errorLabel.style.color = "rgb(25, 135, 84)";
            sessionStorage.removeItem("medinexFlashMessage");
        }

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            const email = document.getElementById("useremail").value.trim().toLowerCase();
            const password = document.getElementById("userpassword").value;
            const demoUser = demoUsers[email];

            if (!demoUser) {
                errorLabel.textContent = "We cant found any acount for this email.";
                errorLabel.style.color = "rgb(255, 62, 62)";
                return;
            }

            if (demoUser.password !== password) {
                errorLabel.textContent = "Wrong credentials: Invalid email or password";
                errorLabel.style.color = "rgb(255, 62, 62)";
                return;
            }

            errorLabel.innerHTML = "&nbsp;";
            errorLabel.style.color = "";
            sessionStorage.setItem("medinexCurrentUser", JSON.stringify({
                email,
                dashboard: demoUser.dashboard,
                fullName: demoUser.fullName || "",
                firstName: demoUser.firstName || "",
                lastName: demoUser.lastName || "",
                role: demoUser.role || ""
            }));
            window.location.href = demoUser.dashboard;
        });
    </script>
</body>
</html>
